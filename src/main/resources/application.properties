quarkus.application.name=orbitcast

quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:mem:orbitcast;DB_CLOSE_DELAY=-1;MODE=Oracle
quarkus.datasource.jdbc.max-size=16

orbitcast.database.initialize=true
orbitcast.database.schema=db/schema.sql
orbitcast.database.data=db/data.sql

%oracle.quarkus.datasource.db-kind=oracle
%oracle.quarkus.datasource.username=${ORACLE_USERNAME}
%oracle.quarkus.datasource.password=${ORACLE_PASSWORD}
%oracle.quarkus.datasource.jdbc.url=${ORACLE_JDBC_URL}
%oracle.quarkus.datasource.jdbc.max-size=16
%oracle.quarkus.datasource.jdbc.transactions=disabled
%oracle.orbitcast.database.initialize=${ORBITCAST_DATABASE_INITIALIZE:false}
%oracle.orbitcast.database.schema=db/oracle/schema.sql
%oracle.orbitcast.database.data=db/oracle/data.sql

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

quarkus.jackson.serialization-inclusion=non-null
